workflows:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Android ARM64 — Release APK (priorité principale du projet)
  # ──────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android ARM64 — Release APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.29.0          # ou "stable" pour toujours la dernière stable
      java: 17
      android_signing:
        - mamai_keystore        # → à créer dans Codemagic > App settings > Code signing
      groups:
        - mamai_env             # variables d'environnement (voir ci-dessous)
      vars:
        PACKAGE_NAME: com.example.mamai
        # Variables sensibles à définir dans le groupe "mamai_env" sur Codemagic :
        #   CM_KEYSTORE           (base64 du .jks)
        #   CM_KEY_ALIAS
        #   CM_KEY_PASSWORD
        #   CM_STORE_PASSWORD

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    scripts:
      # ── Dépendances Flutter ──────────────────────────────────────────────
      - name: flutter pub get
        script: flutter pub get

      # ── Analyse statique ─────────────────────────────────────────────────
      - name: flutter analyze
        script: flutter analyze --no-fatal-infos

      # ── Tests unitaires ──────────────────────────────────────────────────
      # (le smoke test par défaut référence MyApp qui n'existe plus ;
      #  on le désactive jusqu'à ce que les tests soient mis à jour)
      # - name: flutter test
      #   script: flutter test

      # ── Build APK release ARM64 ──────────────────────────────────────────
      - name: Build release APK (arm64)
        script: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - dev@example.com       # ← remplace par ton adresse
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Android — Debug APK (branche develop, build rapide sans signature)
  # ──────────────────────────────────────────────────────────────────────────
  android-debug:
    name: Android ARM64 — Debug APK
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.29.0
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: feature/*
          include: true

    scripts:
      - name: flutter pub get
        script: flutter pub get

      - name: flutter analyze
        script: flutter analyze --no-fatal-infos

      - name: Build debug APK (arm64)
        script: |
          flutter build apk \
            --debug \
            --target-platform android-arm64

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - dev@example.com
        notify:
          success: false
          failure: true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. iOS — Archive IPA (optionnel, décommenter si besoin)
